<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViroFlux API Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col justify-between">

    <!-- Header -->
    <header class="border-b border-gray-800 bg-gray-950/50 backdrop-blur px-6 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-extrabold tracking-wider bg-gradient-to-r from-teal-400 to-blue-500 bg-clip-text text-transparent">
                VIROFLUX SIMULATOR
            </h1>
            <span class="px-3 py-1 bg-green-500/20 text-green-400 border border-green-500/30 rounded-full text-xs font-semibold uppercase tracking-wider">
                API Connected
            </span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-6 py-10 w-full grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <!-- Controls Column -->
        <div class="bg-gray-950/40 border border-gray-800 p-6 rounded-2xl flex flex-col gap-6">
            <h2 class="text-xl font-bold border-b border-gray-800 pb-3">Simulation Parameters</h2>
            
            <form id="sim-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">API URL</label>
                    <input type="text" id="api-url" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm text-teal-400 font-mono focus:outline-none focus:border-teal-500" value="https://viroflux-api.onrender.com">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Time Steps</label>
                    <input type="number" id="time-steps" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-teal-500" value="100">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Initial Infection Rate</label>
                    <input type="number" id="init-inf" step="0.01" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-teal-500" value="0.05">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Transmission Rate</label>
                    <input type="number" id="trans-rate" step="0.01" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-teal-500" value="0.32">
                </div>

                <button type="button" id="run-btn" class="w-full py-3 bg-gradient-to-r from-teal-500 to-blue-600 hover:from-teal-400 hover:to-blue-500 text-white rounded-lg font-bold tracking-wide shadow-lg shadow-teal-500/10 transition duration-150">
                    Run Simulation
                </button>
            </form>
        </div>

        <!-- Chart Visualization Column -->
        <div class="md:col-span-2 bg-gray-950/40 border border-gray-800 p-6 rounded-2xl flex flex-col justify-between">
            <h2 class="text-xl font-bold border-b border-gray-800 pb-3">Projection Model</h2>
            
            <!-- Canvas for Chart.js -->
            <div class="relative h-96 mt-6 flex items-center justify-center">
                <canvas id="flux-chart"></canvas>
                <div id="loading-overlay" class="absolute inset-0 bg-gray-950/80 backdrop-blur-sm rounded-xl flex flex-col items-center justify-center gap-3 hidden">
                    <div class="w-10 h-10 border-4 border-teal-500 border-t-transparent rounded-full animate-spin"></div>
                    <span class="text-sm font-semibold text-teal-400 tracking-wider uppercase animate-pulse">Running API Model...</span>
                </div>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="text-center py-6 border-t border-gray-800 text-xs text-gray-500">
        &copy; 2026 ViroFlux Research Suite • Powered by Render & FastAPI
    </footer>

    <!-- Frontend logic -->
    <script>
        let chartInstance = null;

        document.getElementById('run-btn').addEventListener('click', async () => {
            const apiBase = document.getElementById('api-url').value.replace(/\/$/, '');
            const steps = parseInt(document.getElementById('time-steps').value);
            const initInfection = parseFloat(document.getElementById('init-inf').value);
            const transmission = parseFloat(document.getElementById('trans-rate').value);

            const overlay = document.getElementById('loading-overlay');
            overlay.classList.remove('hidden');

            try {
                // Adjust payload keys to match your specific FastAPI schema fields if necessary
                const response = await fetch(`${apiBase}/simulate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        steps: steps,
                        initial_infection: initInfection,
                        transmission_rate: transmission
                    })
                });

                if (!response.ok) throw new Error('API server returned an error response.');

                const data = await response.json();
                renderChart(data.time, data.projection);

            } catch (err) {
                alert(`Error connecting to your API: ${err.message}\nMake sure the API URL is correct and has awoken from sleep.`);
            } finally {
                overlay.classList.add('hidden');
            }
        });

        function renderChart(labels, values) {
            const ctx = document.getElementById('flux-chart').getContext('2d');
            
            if (chartInstance) {
                chartInstance.destroy();
            }

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Infection Projection Vector',
                        data: values,
                        borderColor: '#14b8a6',
                        backgroundColor: 'rgba(20, 184, 166, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#9ca3af', font: { weight: 'bold' } } }
                    },
                    scales: {
                        x: { grid: { color: '#1f2937' }, ticks: { color: '#9ca3af' } },
                        y: { grid: { color: '#1f2937' }, ticks: { color: '#9ca3af' } }
                    }
                }
            });
        }
    </script>
</body>
</html>
